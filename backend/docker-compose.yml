version: '3.8'

services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://79.174.89.77:18037/${POSTGRES_DB:-Bowling_db}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${DATABASE_USERNAME:-BM_apps}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${DATABASE_PASSWORD:-bfGO320n.s}}
      APP_SERVICE_MODE: auth
      AUTH_SERVICE_PORT: 8082
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-security-please-change-in-production}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081,http://localhost:8082,http://localhost:5173,http://10.0.2.2:8081,http://10.0.2.2:8082}
    restart: unless-stopped

  core-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://79.174.89.77:18037/${POSTGRES_DB:-Bowling_db}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${DATABASE_USERNAME:-BM_apps}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${DATABASE_PASSWORD:-bfGO320n.s}}
      APP_SERVICE_MODE: core
      CORE_SERVICE_PORT: 8081
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-security-please-change-in-production}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      ONEC_ENABLED: ${ONEC_ENABLED:-false}
      ONEC_BASE_URL: ${ONEC_BASE_URL:-http://host.docker.internal:8085}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081,http://localhost:8082,http://localhost:5173,http://10.0.2.2:8081,http://10.0.2.2:8082}
    restart: unless-stopped
